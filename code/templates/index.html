<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilingual Signboard Translator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Times New Roman', serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        header {
            width: 100%;
            background-color: #6200ea;
            color: #fff;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        header h1 {
            font-size: 1.8rem;
        }
        main {
            width: 100%;
            max-width: 600px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }
        button {
            background-color: #6200ea;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #3700b3;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 5px;
        }
        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }
        footer a {
            color: #6200ea;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Multilingual Signboard Translator</h1>
    </header>
    <main>
        <form id="uploadForm">
            <label for="image">Upload Image:</label>
            <input type="file" id="image" name="image" accept="image/*">

            <label for="liveAudioBtn">Or Speak Live:</label>
            <button type="button" id="liveAudioBtn">Speak Now</button>

            <label for="language">Select Language:</label>
            <select id="language" name="language">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="ta">Tamil</option>
                <option value="bn">Bengali</option>
                <option value="te">Telugu</option>
                <option value="kn">Kannada</option>
                <option value="ml">Malayalam</option>
                <option value="mr">Marathi</option>
            </select>

            <button type="submit">Translate and Convert to Speech</button>
        </form>

        <div id="result"></div>
    </main>
    <footer>
        <p>&copy; 2025 Multilingual Translator. Built by <a href="#">Bhoomika</a>. All rights reserved.</p>
    </footer>
    <script>
        let liveAudioSelected = false;

        document.getElementById("liveAudioBtn").onclick = async () => {
            liveAudioSelected = true;
            try {
                const response = await fetch("/", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({
                        live_audio: "true",
                        language: document.getElementById("language").value
                    })
                });
                const result = await response.json();
                displayResult(result);
            } catch (error) {
                document.getElementById("result").innerHTML = `<p style="color: red;">An error occurred. Please try again.</p>`;
            }
        };

        document.getElementById("uploadForm").onsubmit = async (e) => {
            e.preventDefault();

            const imageSelected = document.getElementById("image").files.length > 0;

            if (!imageSelected && !liveAudioSelected) {
                alert("Please upload an image or speak live.");
                return;
            }

            if (liveAudioSelected) {
                liveAudioSelected = false;
                return;
            }

            const formData = new FormData(document.getElementById("uploadForm"));
            try {
                const response = await fetch("/", {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();
                displayResult(result);
            } catch (error) {
                document.getElementById("result").innerHTML = `<p style="color: red;">An error occurred. Please try again.</p>`;
            }
        };

        function displayResult(result) {
            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = `
                <p><strong>Extracted Text:</strong> ${result.extracted_text}</p>
                <p><strong>Translated Text:</strong> ${result.translated_text}</p>
                <audio controls><source src="${result.audio_url}" type="audio/mpeg"></audio>
            `;
        }
    </script>
</body>
</html>
